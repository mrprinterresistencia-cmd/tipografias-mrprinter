<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Vista previa de tipografías</title>

  <style>
    /* ============================
       CONFIGURACIÓN: EDITAR AQUÍ
       ============================

       1) PONÉ tus archivos .otf dentro de /fonts
       2) Renombrá archivos SIN espacios (recomendado) o dejalos y funciona igual en GitHub Pages.
       3) Copiá los nombres exactos (mayúsculas/minúsculas importan).
    */

    /* FILES (cambiá estos 4 nombres por los tuyos reales) */
    :root{
      --f1-file: "CreamCakeBold";
      --f2-file: "Muthiara";
      --f3-file: "Fuente3.otf";
      --f4-file: "Fuente4.otf";
    }

    /* NOTA: No uses comillas “ ”. Solo " */
    @font-face{
      font-family: "F1";
      src: url("CreamCakeBold" var(--f1-file)) format("opentype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face{
      font-family: "F2";
      src: url("Muthiara" var(--f2-file)) format("opentype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
   @font-face{
      font-family: "F3";
      src: url("CreamCakeBold" var(--f1-file)) format("opentype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face{
      font-family: "F4";
      src: url("Muthiara" var(--f2-file)) format("opentype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    /* ===== UI minimalista ===== */
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --border:#e5e7eb;
    }
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    .wrap{
      max-width: 980px;
      margin: 0 auto;
      padding: 20px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 10px 24px rgba(0,0,0,.06);
    }
    h1{
      margin:0 0 10px;
      font-size: 18px;
      font-weight: 800;
    }
    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }
    input{
      flex: 1 1 260px;
      padding: 12px 14px;
      border:1px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      outline:none;
    }
    button{
      padding: 12px 14px;
      border-radius: 12px;
      border:1px solid var(--border);
      background:#111827;
      color:#fff;
      font-weight: 700;
      cursor:pointer;
    }
    button.secondary{
      background:#fff;
      color:#111827;
    }
    .hint{
      margin-top: 8px;
      color:var(--muted);
      font-size: 13px;
    }
    .grid{
      margin-top: 14px;
      display:grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    @media (min-width: 820px){
      .grid{ grid-template-columns: 1fr 1fr; }
    }
    .box{
      border:1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      background:#fff;
    }
    .meta{
      display:flex;
      justify-content: space-between;
      align-items: baseline;
      gap:10px;
    }
    .label{ font-weight:800; font-size:13px; }
    .status{ color:var(--muted); font-size:12px; }
    .sample{
      margin-top:10px;
      line-height: 1.05;
      word-break: break-word;
      font-size: 54px;
    }
    .small{ font-size: 46px; }

    .error{
      margin-top: 12px;
      padding: 10px 12px;
      border:1px solid #fecaca;
      background:#fff1f2;
      color:#9f1239;
      border-radius: 12px;
      font-size: 13px;
      display:none;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <h1>Buscador de nombre — Tipografías</h1>

      <div class="row">
        <input id="name" type="text" value="Sofía" autocomplete="off" spellcheck="false">
        <button id="clear" class="secondary" type="button">Limpiar</button>
        <button id="copy" type="button">Copiar</button>
      </div>

      <div class="hint">
        Si todas se ven iguales, tus fuentes no están cargando (nombres/rutas). Si se ven distintas, está OK.
      </div>

      <div id="err" class="error"></div>

      <div class="grid" id="grid"></div>
    </div>
  </div>

  <script>
    "use strict";

    // Nombres visibles (podés cambiarlos sin afectar la carga)
    const PRESETS = [
      { label: "CreamCakeBold", family: "F1", size: 54 },
      { label: "Muthiarar", family: "F2", size: 54 },
      { label: "Fuente 3", family: "F3", size: 48 },
      { label: "Fuente 4", family: "F4", size: 48 }
    ];

    const elName = document.getElementById("name");
    const elGrid = document.getElementById("grid");
    const elErr  = document.getElementById("err");
    const elClear = document.getElementById("clear");
    const elCopy  = document.getElementById("copy");

    function esc(s){
      return String(s).replace(/[&<>"']/g, c => ({
        "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"
      }[c]));
    }

    function render(){
      const value = (elName.value || "").trim() || "Sofía";
      elGrid.innerHTML = "";

      for (const p of PRESETS){
        const box = document.createElement("div");
        box.className = "box";
        box.innerHTML = `
          <div class="meta">
            <div class="label">${esc(p.label)}</div>
            <div class="status">${p.size}px</div>
          </div>
          <div class="sample ${p.size < 54 ? "small" : ""}" style="font-family:${esc(p.family)}; font-size:${p.size}px;">
            ${esc(value)}
          </div>
        `;
        elGrid.appendChild(box);
      }
    }

    // Diagnóstico simple: si ninguna fuente existe, se verá todo igual. No rompe, pero te avisa.
    async function diagnostics(){
      // Comprobamos si el navegador conoce las familias; si no, algo falló con @font-face o rutas.
      const missing = PRESETS.filter(p => !document.fonts.check(`16px ${p.family}`)).map(p => p.label);
      if (missing.length){
        elErr.style.display = "block";
        elErr.textContent =
          "Aviso: estas fuentes NO están cargando:\n- " + missing.join("\n- ") +
          "\n\nRevisá:\n1) carpeta ./fonts al lado de index.html\n2) nombres exactos de archivos\n3) que el archivo sea .otf real\n4) que el archivo no tenga espacios (o si los tiene, renombrar recomendado).";
      } else {
        elErr.style.display = "none";
        elErr.textContent = "";
      }
    }

    elName.addEventListener("input", () => { render(); diagnostics(); });

    elClear.addEventListener("click", () => {
      elName.value = "";
      render();
      diagnostics();
      elName.focus();
    });

    elCopy.addEventListener("click", async () => {
      const value = (elName.value || "").trim() || "Sofía";
      try { await navigator.clipboard.writeText(value); } catch (e) {}
    });

    render();
    diagnostics();
  </script>
</body>
</html>
